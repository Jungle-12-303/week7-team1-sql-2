  <rect class="bg" width="1500" height="980"/>
  <text class="title" x="40" y="42">k=4 예시: 75 삽입이 leaf split -> internal split -> root split으로 전파되는 전체 구조</text>
  <text class="sub" x="40" y="68">최대 key 수를 4개로 둔 학습용 예시입니다. 삽입 전과 후 모두 leaf level을 같은 깊이로 표시했습니다.</text>
  <line class="divider" x1="40" y1="92" x2="1460" y2="92"/>

  <!-- BEFORE -->

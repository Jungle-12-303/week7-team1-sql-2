      .arrow { stroke: #dc2626; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .next { stroke: #16a34a; stroke-width: 1.6; fill: none; marker-end: url(#greenArrow); stroke-dasharray: 5 4; }
      .divider { stroke: #cbd5e1; stroke-width: 1.5; }

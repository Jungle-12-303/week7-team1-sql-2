  <text class="note" x="40" y="890">변화: [70|71|72|74]에 75를 넣어 [70|71] / [72|74|75]로 leaf split, C1은 C1L/C1R로 split, root는 새 root [100]을 만듭니다.</text>
  <text class="note" x="40" y="915">C0, C2, C3, C4는 원래 있던 child이고, C1L/C1R만 기존 C1이 split되어 생긴 child입니다. 모든 leaf는 같은 깊이에 있습니다.</text>

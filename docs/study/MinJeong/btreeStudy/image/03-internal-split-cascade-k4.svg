      .note { font: 500 14px sans-serif; fill: #475569; }
      .node { font: 700 13px sans-serif; fill: #111827; }
      .leafText { font: 700 10px sans-serif; fill: #14532d; }
      .root { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }

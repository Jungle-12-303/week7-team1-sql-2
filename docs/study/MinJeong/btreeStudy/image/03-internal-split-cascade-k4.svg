  <text class="note" x="770" y="395">75는 C1의 [70|71|72|74] leaf로 내려갑니다. 이 leaf, C1, root가 모두 가득 차 있어서 split이 위로 전파됩니다.</text>
  <path class="arrow" d="M 785 385 C 690 365, 610 365, 525 358"/>

  <line class="divider" x1="40" y1="440" x2="1460" y2="440"/>


<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px sans-serif; fill: #111827; }
      .sub { font: 500 15px sans-serif; fill: #475569; }
      .head { font: 700 18px sans-serif; fill: #111827; }
      .txt { font: 600 14px sans-serif; fill: #111827; }
      .small { font: 500 12px sans-serif; fill: #475569; }
      .tiny { font: 500 11px sans-serif; fill: #64748b; }
      .request { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .program { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .ramBox { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .diskBox { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .hitBox { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .missBox { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .page { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .indexPage { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
      .dataPage { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .hitArrow { stroke: #059669; stroke-width: 2.4; fill: none; marker-end: url(#hitArrow); }
      .missArrow { stroke: #dc2626; stroke-width: 2.4; fill: none; marker-end: url(#missArrow); }
      .loadArrow { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#loadArrow); }
      .dash { stroke-dasharray: 7 5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#334155"/>
    </marker>
    <marker id="hitArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#059669"/>
    </marker>
    <marker id="missArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#dc2626"/>
    </marker>
    <marker id="loadArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="980"/>
  <text class="title" x="50" y="46">사용자 SELECT 요청에서 RAM/page cache와 디스크를 확인하는 흐름</text>
  <text class="sub" x="50" y="74">CPU, 레지스터, CPU cache는 생략하고 DB page가 RAM에 있는 경우와 없는 경우만 나누어 봅니다.</text>

  <!-- Top request flow -->
  <rect class="request" x="80" y="115" width="250" height="78" rx="10"/>
  <text class="head" x="105" y="145">사용자 조회 요청</text>
  <text class="small" x="105" y="169">SELECT * FROM students</text>
  <text class="small" x="105" y="187">WHERE id = 7,500,000;</text>

  <rect class="program" x="430" y="115" width="260" height="78" rx="10"/>
  <text class="head" x="455" y="145">DB 프로그램</text>
  <text class="small" x="455" y="169">B+ Tree 인덱스로</text>
  <text class="small" x="455" y="187">필요한 page를 찾음</text>

  <rect class="program" x="790" y="115" width="280" height="78" rx="10"/>
  <text class="head" x="815" y="145">RAM/page cache 확인</text>
  <text class="small" x="815" y="169">root, internal, leaf, data page가</text>
  <text class="small" x="815" y="187">이미 올라와 있는지 확인</text>

  <path class="arrow" d="M 330 154 L 430 154"/>
  <text class="tiny" x="357" y="143">SQL 전달</text>
  <path class="arrow" d="M 690 154 L 790 154"/>
  <text class="tiny" x="710" y="143">필요 page 확인</text>

  <!-- Case A cache hit -->
  <rect class="hitBox" x="80" y="270" width="610" height="300" rx="12"/>
  <text class="head" x="110" y="305">경우 A. RAM에 이미 필요한 page가 있음 cache hit</text>
  <text class="small" x="110" y="328">이전에 같은 범위나 가까운 id를 조회해서 page가 RAM/page cache에 남아 있는 상황입니다.</text>

  <rect class="indexPage" x="120" y="365" width="150" height="66" rx="8"/>
  <text class="txt" x="142" y="391">root page</text>
  <text class="tiny" x="142" y="412">범위 선택</text>

  <rect class="indexPage" x="305" y="365" width="150" height="66" rx="8"/>
  <text class="txt" x="322" y="391">internal page</text>
  <text class="tiny" x="322" y="412">더 좁은 범위</text>

  <rect class="indexPage" x="490" y="365" width="150" height="66" rx="8"/>
  <text class="txt" x="516" y="391">leaf page</text>
  <text class="tiny" x="516" y="412">data page 위치</text>

  <rect class="dataPage" x="255" y="475" width="250" height="62" rx="8"/>
  <text class="txt" x="292" y="501">data page 74999</text>
  <text class="tiny" x="292" y="522">RAM에서 row 바로 확인</text>

  <path class="hitArrow" d="M 270 398 L 305 398"/>
  <path class="hitArrow" d="M 455 398 L 490 398"/>
  <path class="hitArrow" d="M 565 431 C 560 458, 520 490, 505 502"/>

  <rect class="hitBox" x="900" y="270" width="290" height="90" rx="10"/>
  <text class="head" x="925" y="304">결과</text>
  <text class="small" x="925" y="328">디스크를 새로 읽지 않고</text>
  <text class="small" x="925" y="346">RAM에서 row 반환</text>

  <path class="hitArrow" d="M 1070 193 C 1010 230, 920 255, 690 315"/>
  <text class="small" x="985" y="236">있다</text>
  <path class="hitArrow" d="M 505 506 C 680 500, 820 420, 900 322"/>

  <!-- Case B cache miss -->
  <rect class="missBox" x="80" y="630" width="610" height="295" rx="12"/>
  <text class="head" x="110" y="665">경우 B. RAM에 필요한 page가 없음 cache miss</text>
  <text class="small" x="110" y="688">처음 조회하거나 필요한 page가 cache에서 밀려난 상황입니다. DB는 디스크에서 page를 읽어 RAM에 올립니다.</text>

  <rect class="diskBox" x="115" y="725" width="210" height="150" rx="10"/>
  <text class="head" x="140" y="757">디스크의 DB 파일</text>
  <text class="small" x="140" y="783">root index page</text>
  <text class="small" x="140" y="805">internal index page</text>
  <text class="small" x="140" y="827">leaf index page</text>
  <text class="small" x="140" y="849">data page 74999</text>

  <rect class="ramBox" x="430" y="725" width="210" height="150" rx="10"/>
  <text class="head" x="455" y="757">RAM/page cache</text>
  <text class="small" x="455" y="783">읽어온 page 저장</text>
  <text class="small" x="455" y="805">이후 같은 page 조회 시</text>
  <text class="small" x="455" y="827">cache hit 가능</text>

  <path class="loadArrow" d="M 325 800 L 430 800"/>
  <text class="small" x="345" y="788">디스크 read</text>

  <rect class="missBox" x="900" y="650" width="290" height="110" rx="10"/>
  <text class="head" x="925" y="684">먼저 발생하는 일</text>
  <text class="small" x="925" y="708">필요한 DB page가 RAM에 없어</text>
  <text class="small" x="925" y="726">디스크 I/O가 발생함</text>
  <text class="small" x="925" y="744">그래서 더 느릴 수 있음</text>

  <path class="missArrow" d="M 930 193 C 875 300, 835 500, 690 682"/>
  <text class="small" x="844" y="416">없다</text>
  <path class="loadArrow" d="M 640 800 C 760 790, 850 740, 900 705"/>

  <!-- Right side summary -->
  <rect class="program" x="1230" y="270" width="220" height="145" rx="12"/>
  <text class="head" x="1255" y="304">핵심 비교</text>
  <text class="small" x="1255" y="330">cache hit</text>
  <text class="tiny" x="1278" y="350">RAM에서 바로 사용</text>
  <text class="small" x="1255" y="378">cache miss</text>
  <text class="tiny" x="1278" y="398">디스크에서 읽은 뒤 사용</text>

  <rect class="program" x="1230" y="650" width="220" height="145" rx="12"/>
  <text class="head" x="1255" y="684">B+ Tree 역할</text>
  <text class="small" x="1255" y="710">전체 data page를</text>
  <text class="small" x="1255" y="730">다 읽지 않고</text>
  <text class="small" x="1255" y="750">필요한 page 위치까지</text>
  <text class="small" x="1255" y="770">빠르게 안내</text>

  <path class="arrow dash" d="M 640 431 C 790 450, 950 520, 1230 705"/>
  <text class="tiny" x="815" y="500">leaf page가 data page 위치를 알려줌</text>

  <!-- Bottom note -->
  <rect class="request" x="420" y="920" width="660" height="38" rx="8"/>
  <text class="small" x="450" y="944">이 그림에서 RAM은 DB가 직접 관리하는 메모리와 OS page cache를 단순화해 함께 표현한 것입니다.</text>
</svg>
